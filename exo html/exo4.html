<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <fieldset> // permet de regrouper les éléments du formulaire
            <legend>Informations personnelles</legend> // permet de donner un titre au fieldset
            <label for="nom">Nom:</label>
            <input type="text" id="nom" name="nom" required min="4" max="20"><br><br>

            <label for="prenom">Prénom:</label>
            <input type="text" id="prenom" name="prenom" required min="2" max="100"><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="age">Âge:</label>
            <input type="number" id="age" name="age" min="0" required><br><br>

            <label for="telphone">Téléphone:</label>
            <input type="tel" id="telphone" name="telphone" required min="10" max="15"><br><br>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" cols="50" required></textarea><br><br> // permet de créer un champ de texte multiligne
            <label for="sujet">Sujet:</label>
            <select id="sujet" name="sujet" required>
                <option value="">Sélectionnez le type de message</option>
                <option value="information">Demande d'information</option>
                <option value="commande">Commande</option>
                <option value="autre">Autre</option>
            </select><br><br>

            <button type="submit">Envoyer</button> // permet de créer un bouton pour soumettre le formulaire
            <button type="reset">Réinitialiser</button> // permet de créer un bouton pour réinitialiser le formulaire
        </fieldset>
    </form>
</body>
</html>
