<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma première page</title>
    
</head>

<body>
    <form action="" id="monFormulaire">
        <label for="name">Nom :</label>
        <input type="text" id="name" name="name" required minlength="2" maxlength="20">
        
        // minlength est utilisé pour
        presisé le nombre de lettre à avoir dans le champ

        <label for="prenom">prenom</label>
        <input type="text" id="prenom" name="prenom" required minlength="2" maxlength="20">

        <label for="email">Email :</label>
        <input type="email" id="email" name="email" required placeholder="votre@email.com">

        <label for="password">Mot de passe :</label>
        <input type="password" id="password" name="password" required minlength="8" maxlength="10">

        <button type="submit" >S'inscrire</button>
        
    </form>


    <!-- exo5 -->
    <h2>Recherchez une ville</h2>

    <input type="text" id="ville" placeholder="Entrez le nom d'une ville">
    <button id="villeButton">Rechercher</button>
    
</body>
<script src="exo.js"></script>
<script src="exo5.js"></script>
</html>
